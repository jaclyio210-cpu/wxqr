<h2>活码生成后，怎么发布到社交平台？</h2>
<p class="subtitle">你提到要截图发布，具体想要什么操作体验？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>App 内一键保存图片到本地</h3>
      <p>生成活码后，点按钮保存为 PNG 图片，然后自己打开微信/微博手动发</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>App 内自动截图 + 复制到剪贴板</h3>
      <p>一键把活码图片复制到剪贴板，直接粘贴到任何社交平台</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>A + B 都要</h3>
      <p>既能保存文件，也能复制到剪贴板，用哪个都行</p>
    </div>
  </div>
</div>
