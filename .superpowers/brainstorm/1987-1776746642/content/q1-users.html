<h2>这个 App 给谁用？</h2>
<p class="subtitle">这会影响是否需要账号系统、多用户支持等架构设计</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>只有我自己用</h3>
      <p>个人工具，不需要注册登录，直接管理自己的活码</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>多人使用（团队）</h3>
      <p>每个人有自己的账号，可以各自创建和管理活码</p>
    </div>
  </div>
</div>
