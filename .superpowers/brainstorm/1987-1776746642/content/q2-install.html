<h2>怎么把 App 装到 iPhone 上？</h2>
<p class="subtitle">这是关键约束，决定我们用什么技术栈来构建</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>PWA（网页版，加到主屏幕）</h3>
      <p>用 Safari 打开网址 → 添加到主屏幕 → 像 App 一样使用。<strong>无需 Apple 账号、无需 Mac</strong>，今天就能用</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Xcode 直装（真正的原生 App）</h3>
      <p>需要一台 Mac + Xcode + 用数据线连接 iPhone。Apple ID 即可，<strong>不需要付费开发者账号</strong></p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>TestFlight（正规分发）</h3>
      <p>需要 Apple 开发者账号（$99/年）。上传后通过 TestFlight 链接安装，<strong>无需 Mac，任何 iPhone 都能装</strong></p>
    </div>
  </div>
</div>
