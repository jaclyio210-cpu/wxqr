<h2>Windows 桌面 App UI 设计</h2>
<p class="subtitle">两个主要界面，操作流程简单直接</p>

<div class="split" style="gap:20px;margin-top:16px">

  <!-- 界面1: 主页/列表 -->
  <div class="mockup" style="flex:1">
    <div class="mockup-header">界面 1 — 活码列表（主页）</div>
    <div class="mockup-body" style="padding:0;overflow:hidden">
      <div style="background:#1976d2;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:#fff;font-weight:bold;font-size:14px">🔄 微信活码管理</span>
        <button style="background:#fff;color:#1976d2;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer">+ 新建活码</button>
      </div>
      <div style="padding:12px">
        <!-- 活码卡片 1 -->
        <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
          <div style="width:48px;height:48px;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px">▦</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:bold">活码 #1</div>
            <div style="font-size:11px;color:#888">已扫描 42 次 · 微信号A + 微信号B</div>
          </div>
          <div style="display:flex;gap:6px">
            <button style="background:#e3f2fd;color:#1565c0;border:none;border-radius:4px;padding:4px 8px;font-size:11px">保存图片</button>
            <button style="background:#fce4ec;color:#c62828;border:none;border-radius:4px;padding:4px 8px;font-size:11px">删除</button>
          </div>
        </div>
        <!-- 活码卡片 2 -->
        <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px">
          <div style="width:48px;height:48px;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px">▦</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:bold">活码 #2</div>
            <div style="font-size:11px;color:#888">已扫描 8 次 · 微信号C + 微信号D</div>
          </div>
          <div style="display:flex;gap:6px">
            <button style="background:#e3f2fd;color:#1565c0;border:none;border-radius:4px;padding:4px 8px;font-size:11px">保存图片</button>
            <button style="background:#fce4ec;color:#c62828;border:none;border-radius:4px;padding:4px 8px;font-size:11px">删除</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 界面2: 新建活码 -->
  <div class="mockup" style="flex:1">
    <div class="mockup-header">界面 2 — 新建活码</div>
    <div class="mockup-body" style="padding:16px">
      <div style="font-size:12px;color:#555;margin-bottom:12px">上传两个微信号的二维码图片，系统自动交替轮换</div>

      <div style="display:flex;gap:12px;margin-bottom:16px">
        <!-- 上传框1 -->
        <div style="flex:1;border:2px dashed #1976d2;border-radius:8px;padding:16px;text-align:center;background:#f8fbff">
          <div style="font-size:24px;margin-bottom:4px">📷</div>
          <div style="font-size:12px;color:#1976d2;font-weight:bold">微信号 1</div>
          <div style="font-size:11px;color:#999;margin-top:4px">点击上传图片</div>
        </div>
        <!-- 上传框2 -->
        <div style="flex:1;border:2px dashed #1976d2;border-radius:8px;padding:16px;text-align:center;background:#f8fbff">
          <div style="font-size:24px;margin-bottom:4px">📷</div>
          <div style="font-size:12px;color:#1976d2;font-weight:bold">微信号 2</div>
          <div style="font-size:11px;color:#999;margin-top:4px">点击上传图片</div>
        </div>
      </div>

      <button style="width:100%;background:#1976d2;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;margin-bottom:12px">⚡ 生成活码</button>

      <!-- 生成结果 -->
      <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center;background:#f9f9f9">
        <div style="width:80px;height:80px;background:#ddd;border-radius:6px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:32px">▦</div>
        <div style="font-size:11px;color:#888;margin-bottom:8px">活码已生成，发给客户扫描即可</div>
        <button style="background:#43a047;color:#fff;border:none;border-radius:6px;padding:6px 20px;font-size:13px;cursor:pointer">💾 保存图片到本地</button>
      </div>
    </div>
  </div>

</div>

<div style="margin-top:16px;padding:12px 16px;background:#e8f5e9;border-radius:8px;font-size:13px">
  <strong>扫码者看到的页面：</strong>手机浏览器打开一个简洁的网页，显示对应的微信二维码图片 + "长按识别添加微信"提示
</div>
